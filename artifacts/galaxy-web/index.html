<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    
    <link rel="manifest" href="./manifest.json" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1A0F2E" />

    <meta name="description" content="Galaxy Voice Chat - Find your voice, find your galaxy" />
    <meta property="og:title" content="Galaxy Voice Chat" />
    <meta property="og:description" content="Live voice rooms, gifts, leaderboards & community. Find your voice, find your galaxy." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:type" content="website" />
    
    <title>Galaxy Voice Chat</title>
    <link rel="icon" href="/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      /* Browser ke default scrolling aur bounce ko jad se khatam karne ke liye */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden !important;
        position: fixed; /* Poora page lock taaki keyboard wallpaper na hila sake */
        overscroll-behavior: none; /* Rubber-band effect band */
        -webkit-overflow-scrolling: touch;
        background-color: #080412; /* Fallback color */
      }
      #root {
        height: 100%;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
