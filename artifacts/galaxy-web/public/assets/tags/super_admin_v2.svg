<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 52" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="200" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a3e"/>
      <stop offset="50%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#1a0a3e"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#CC9900"/>
    </linearGradient>
    <linearGradient id="crownGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE88A"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <path d="M24 26 C10 22, 4 14, 0 6 L0 46 C4 38, 10 30, 24 26Z" fill="url(#goldGrad)" opacity="0.7"/>
  <path d="M176 26 C190 22, 196 14, 200 6 L200 46 C196 38, 190 30, 176 26Z" fill="url(#goldGrad)" opacity="0.7"/>
  <path d="M16 26 C8 23, 3 17, 0 10 L0 42 C3 35, 8 29, 16 26Z" fill="#FFD700" opacity="0.4"/>
  <path d="M184 26 C192 23, 197 17, 200 10 L200 42 C197 35, 192 29, 184 26Z" fill="#FFD700" opacity="0.4"/>
  <path d="M12 26 C6 24, 2 20, 0 15 L0 37 C2 32, 6 28, 12 26Z" fill="#FFE066" opacity="0.25"/>
  <path d="M188 26 C194 24, 198 20, 200 15 L200 37 C198 32, 194 28, 188 26Z" fill="#FFE066" opacity="0.25"/>
  <rect x="20" y="4" width="160" height="44" rx="22" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="1.5"/>
  <rect x="22" y="6" width="156" height="40" rx="20" fill="none" stroke="rgba(255,215,0,0.15)" stroke-width="0.5"/>
  <g transform="translate(100, 6)" filter="url(#glow)">
    <polygon points="0,-4 -8,3 -5,3 -3,8 3,8 5,3 8,3" fill="url(#crownGrad)"/>
    <circle cx="-6" cy="0" r="1.2" fill="#FFE066"/>
    <circle cx="0" cy="-4" r="1.2" fill="#FFE066"/>
    <circle cx="6" cy="0" r="1.2" fill="#FFE066"/>
  </g>
  <circle cx="36" cy="20" r="0.8" fill="#00ffff" opacity="0.7">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="164" cy="20" r="0.8" fill="#00ffff" opacity="0.7">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="42" cy="36" r="0.6" fill="#bf00ff" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="158" cy="36" r="0.6" fill="#bf00ff" opacity="0.6">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="14" r="0.5" fill="#FFD700" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="14" r="0.5" fill="#FFD700" opacity="0.5">
    <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="100" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="13" letter-spacing="3" fill="url(#goldGrad)" filter="url(#neonGlow)">SUPER ADMIN</text>
  <text x="100" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="6" letter-spacing="2" fill="#A29BFE" opacity="0.6">V2</text>
</svg>