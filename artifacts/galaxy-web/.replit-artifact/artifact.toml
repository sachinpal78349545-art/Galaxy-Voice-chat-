kind = "web"
previewPath = "/galaxy-web/"
title = "Galaxy Voice Chat Web"
version = "1.0.0"
id = "artifacts/galaxy-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/galaxy-web/" ]
localPort = 24090

[services.development]
run = "pnpm --filter @workspace/galaxy-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/galaxy-web", "run", "build" ]
publicDir = "artifacts/galaxy-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24090"
BASE_PATH = "/galaxy-web/"
