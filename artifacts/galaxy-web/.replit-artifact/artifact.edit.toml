kind = "web"
previewPath = "/"
title = "Galaxy Voice Chat Web"
version = "1.0.0"
id = "artifacts/galaxy-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24090

[services.development]
run = "pnpm --filter @workspace/galaxy-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/galaxy-web", "run", "build" ]
run = "pnpm --filter @workspace/galaxy-web run start"

[services.env]
PORT = "24090"
BASE_PATH = "/"
