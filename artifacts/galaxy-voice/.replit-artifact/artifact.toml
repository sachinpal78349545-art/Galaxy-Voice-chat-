kind = "web"
previewPath = "/"
title = "Galaxy Voice Chat"
version = "1.0.0"
id = "artifacts/galaxy-voice"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18098

[services.development]
run = "pnpm --filter @workspace/galaxy-voice run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/galaxy-voice", "run", "build" ]
publicDir = "artifacts/galaxy-voice/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18098"
BASE_PATH = "/"
